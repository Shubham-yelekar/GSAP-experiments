<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />

    <title>Document</title>
  </head>
  <body>
    <section class="h-screen flex items-center justify-center">
      <h1 class="text-5xl tracking-tight">Intro</h1>
    </section>
    <section class="block block--main">
      <div class="block__wrapper">
        <div class="content">
          <h2 class="content__title">Sticky Grid Scroll</h2>
          <p class="content__description">...</p>
          <button class="content__button">...</button>
        </div>
        <div class="gallery">
          <ul class="gallery__grid">
            <li class="gallery__item">
              <img
                class="gallery__image"
                src="./assets/picture-1.webp"
                alt="..."
              />
            </li>
            <!-- Repeat to get 12 items -->
          </ul>
        </div>
      </div>
    </section>

    <section class="h-screen flex items-center justify-center">
      <h1 class="text-5xl tracking-tight">Outro</h1>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.17/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
